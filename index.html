async function showAIMatches() {
  // Gate behind Growth or Enterprise plan
  const userPlan = state.auth?.plan || state.plan || 'starter';
  const planOrder = {starter:0, free:0, pro:1, growth:1, elite:2, agency:2, enterprise:2};
  if((planOrder[userPlan] ?? 0) < 1) {
    openModal(`
    <div style="text-align:center;padding:24px 16px">
      <div style="font-size:52px;margin-bottom:12px">✦</div>
      <h3 style="margin-bottom:8px">AI Matching is a Growth feature</h3>
      <p style="color:var(--text3);font-size:14px;margin-bottom:20px;line-height:1.6">
        Upgrade to Growth or Enterprise to get AI-powered provider recommendations based on your profile, briefs, and activity.
      </p>
      <button class="btn btn-primary w-full" onclick="pricingView='seeker';navigate('pricing');closeModal()">View Plans →</button>
      <button class="btn btn-ghost btn-sm w-full mt-2" onclick="closeModal()">Maybe later</button>
    </div>`);
    return;
  }

  // Need real providers to match against
  const providers = state.providers || [];
  if(providers.length === 0) {
    openModal(`
    <div style="text-align:center;padding:24px 16px">
      <div style="font-size:52px;margin-bottom:12px">🔍</div>
      <h3 style="margin-bottom:8px">No providers to match yet</h3>
      <p style="color:var(--text3);font-size:14px;margin-bottom:20px;line-height:1.6">
        AI matching works once there are providers on the platform. Check back soon — or browse all providers manually.
      </p>
      <button class="btn btn-primary w-full" onclick="viewMode='browse';navigate('seeker');closeModal()">Browse Providers</button>
      <button class="btn btn-ghost btn-sm w-full mt-2" onclick="closeModal()">Close</button>
    </div>`);
    return;
  }

  // Build context about the user
  const profile = {
    role: state.auth?.role,
    entityType: state.auth?.entityType,
    plan: userPlan,
    savedProviders: (state.savedProviders||[]).map(id => {
      const p = providers.find(x=>x.id===id);
      return p ? `${p.name} (${p.category})` : null;
    }).filter(Boolean),
    postedBriefs: (state.seekerPosts||[]).filter(p=>p.authorName===state.auth?.name).map(p=>p.title),
    postedJobs: (state.postedJobs||[]).map(j=>j.title),
  };

  const providerData = providers.map(p => ({
    id: p.id, name: p.name, category: p.category, rating: p.rating,
    rate: p.rate, tags: p.tags, bio: p.bio, verified: p.verified
  }));

  openModal(`
  <div class="modal-header">
    <h3>✦ AI Provider Matching</h3>
    <button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()">✕</button>
  </div>
  <div class="ai-thinking" id="aiThinking">
    <div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div>
    <div style="font-size:13px;color:var(--accent);font-weight:500">Analyzing your profile and finding best matches...</div>
  </div>
  <div id="aiMatchResults"></div>`, true);

  try {
    const prompt = `You are a B2B marketplace matching assistant. Given a user profile and list of providers, return the top 3 best-matched providers with match scores and reasoning.

User profile: ${JSON.stringify(profile)}

Available providers: ${JSON.stringify(providerData)}

Return ONLY a JSON array of exactly 3 objects, no markdown, no explanation:
[{"id":1,"score":95,"headline":"One sentence why they are the top match","reasons":["reason 1","reason 2","reason 3"]}]

Score from 60-99. Make reasons specific to the user's profile and needs. Only use provider IDs that exist in the list above.`;

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await resp.json();
    const raw = data.content?.find(b=>b.type==='text')?.text || '[]';
    const clean = raw.replace(/```json|```/g,'').trim();
    const matches = JSON.parse(clean);

    const thinking = document.getElementById('aiThinking');
    const results = document.getElementById('aiMatchResults');
    if(!thinking || !results) return;
    thinking.remove();

    results.innerHTML = `
    <p style="font-size:13px;color:var(--text3);margin-bottom:14px">Based on your profile, saved providers, and activity — here are your best matches:</p>
    ${matches.map((m,i) => {
      const p = state.providers.find(x=>x.id===m.id);
      if(!p) return '';
      const scoreColor = m.score >= 90 ? '#00C07F' : m.score >= 80 ? '#0057FF' : '#F59E0B';
      return `
      <div class="ai-match-result mb-3" onclick="closeModal();viewProviderDetail(${p.id})">
        <div style="padding:14px">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
            <div style="position:relative">
              ${avatarDiv(p.avatar,p.color,'md')}
              <div style="position:absolute;bottom:-4px;right:-4px;background:${scoreColor};color:#fff;font-size:9px;font-weight:900;padding:2px 5px;border-radius:100px">${m.score}%</div>
            </div>
            <div style="flex:1">
              <div style="font-weight:700;display:flex;align-items:center;gap:6px">${p.name} ${p.verified?'<span style="color:#00C07F;font-size:11px">✓ Verified</span>':''}</div>
              <div style="font-size:12px;color:var(--text3)">${p.title}</div>
              <div style="font-size:12px;color:var(--text3)">${p.rating} ★ · ${p.rate}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:20px;font-weight:900;font-family:var(--font-display);color:${scoreColor}">${m.score}%</div>
              <div style="font-size:10px;color:var(--text3)">match</div>
            </div>
          </div>
          <div class="ai-score-bar"><div class="ai-score-fill" style="width:${m.score}%"></div></div>
          <p style="font-size:12px;color:var(--text2);margin:8px 0">${m.headline}</p>
          <div style="display:flex;flex-wrap:wrap;gap:4px">
            ${(m.reasons||[]).map(r=>`<span class="ai-reason-chip">✦ ${r}</span>`).join('')}
          </div>
        </div>
        <div style="padding:10px 14px;background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:8px">
          <button class="btn btn-primary btn-sm flex-1" onclick="event.stopPropagation();openQuote(${p.id})">Contact</button>
          <button class="btn btn-outline btn-sm flex-1" onclick="event.stopPropagation();closeModal();viewProviderDetail(${p.id})">View Profile</button>
        </div>
      </div>`;
    }).join('')}
    <button class="btn btn-ghost btn-sm w-full mt-2" onclick="closeModal()">Close</button>`;

    playNotifSound('success');
  } catch(err) {
    const thinking = document.getElementById('aiThinking');
    const results = document.getElementById('aiMatchResults');
    if(thinking) thinking.remove();
    if(results) results.innerHTML = `
    <div style="text-align:center;padding:24px">
      <div style="font-size:36px;margin-bottom:10px">⚠</div>
      <div style="font-weight:600;margin-bottom:6px">Could not load AI matches</div>
      <div style="font-size:13px;color:var(--text3);margin-bottom:16px">${err.message || 'Please try again in a moment'}</div>
      <button class="btn btn-primary w-full" onclick="closeModal();showAIMatches()">Try Again</button>
      <button class="btn btn-ghost btn-sm w-full mt-2" onclick="closeModal()">Close</button>
    </div>`;
  }
}

function submitBrief(editId) {
  const title = document.getElementById('briefTitle')?.value?.trim();
  if(!title) { showToast('Please add a title for your brief', 'warning'); return; }
  const desc = document.getElementById('briefDesc')?.value?.trim();
  if(!desc) { showToast('Please describe what you need', 'warning'); return; }

  const tagsRaw = document.getElementById('briefTags')?.value || '';
  const tags = tagsRaw.split(',').map(t=>t.trim()).filter(Boolean);

  const brief = {
    id: editId || Date.now(),
    authorName: state.auth?.name || 'Anonymous',
    authorAvatar: state.auth?.avatar || 'U',
    authorColor: '#0057FF',
    authorEntity: state.auth?.entityType || 'individual',
    title,
    category: document.getElementById('briefCat')?.value || 'Other',
    budget: document.getElementById('briefBudget')?.value || 'TBD',
    desc,
    tags,
    urgent: document.getElementById('briefUrgent')?.checked || false,
    remote: document.getElementById('briefRemote')?.checked !== false,
    posted: 'Just now',
    replies: 0,
    views: 0,
    status: 'open',
  };

  if(!state.seekerPosts) state.seekerPosts = [];
  if(editId) {
    const idx = (state.seekerPosts||[]).findIndex(p=>p.id===editId);
    if(idx !== -1) state.seekerPosts[idx] = {...state.seekerPosts[idx], ...brief};
  } else {
    if(!state.seekerPosts) state.seekerPosts=[]; state.seekerPosts.unshift(brief);
    if(state.auth?.id && !String(state.auth.id).match(/^\d+$/)) {
      sbSubmitBrief(brief).catch(err => console.warn('Brief sync:', err.message));
    }
  }
  saveState();
  closeModal();
  showToast(editId ? 'Brief updated!' : 'Brief posted! Providers will start pitching soon. 🎉', 'success'); if(!editId) addNotification('Your brief is live — providers can now see and pitch to it', '📢', 'brief');
  viewMode = 'posts';
  render();
}

function editBrief(id) {
  const post = (state.seekerPosts||[]).find(p=>p.id===id);
  if(post) openPostBriefModal(post);
}

function closeBrief(id) {
  const post = (state.seekerPosts||[]).find(p=>p.id===id);
  if(!post) return;
  post.status = 'closed';

}

function renderProviderCalendar() {
  const days = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const now = new Date();
  if(state.calYear === undefined) state.calYear = now.getFullYear();
  if(state.calMonth === undefined) state.calMonth = now.getMonth();
  const calYear = state.calYear;
  const calMonth = state.calMonth;
  const today = now.getDate();
  const isCurrentMonth = calYear === now.getFullYear() && calMonth === now.getMonth();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const startDay = new Date(calYear, calMonth, 1).getDay();
  const monthName = new Date(calYear, calMonth, 1).toLocaleString('default', {month:'long', year:'numeric'});
  const avail = state.calendarAvailability || [];
  const synced = state.calendarSynced || {};

  return `
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <h2 class="dash-title" style="margin:0">Availability Calendar</h2>
      <button class="btn btn-primary btn-sm" onclick="openCalendarSyncModal()">🔗 Sync Calendar</button>
    </div>

    ${Object.keys(synced).length > 0 ? `
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
      ${Object.entries(synced).map(([k,v])=>`
      <div style="display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border);padding:6px 12px;border-radius:100px;font-size:12px;font-weight:600">
        <span>${k==='google'?'📅':k==='outlook'?'📧':'📆'}</span>
        <span>${k==='google'?'Google Calendar':k==='outlook'?'Outlook':'Apple Calendar'}</span>
        <span style="color:var(--success)">● Synced</span>
        <button onclick="unsyncCalendar('${k}')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;padding:0 2px">✕</button>
      </div>`).join('')}
    </div>` : ''}

    <div class="grid-2">
      <div class="card">
        <div class="cal-header">
          <button class="btn btn-ghost btn-icon btn-sm" onclick="calNavMonth(-1)">←</button>
          <div style="font-weight:700">${monthName}</div>
          <button class="btn btn-ghost btn-icon btn-sm" onclick="calNavMonth(1)">→</button>
        </div>
        <div class="calendar-grid">
          ${days.map(d=>`<div class="cal-day-label">${d}</div>`).join('')}
          ${Array(startDay).fill(0).map(()=>'<div></div>').join('')}
          ${Array.from({length:daysInMonth},(_,i)=>i+1).map(d => {
            const key = calYear+'-'+calMonth+'-'+d;
            const isToday = isCurrentMonth && d===today;
            const isAvail = avail.includes(key);
            return `<div class="cal-day ${isToday?'today':isAvail?'available':''}" onclick="toggleCalendarDay(${d})" title="${isAvail?'Available':'Click to mark available'}">${d}</div>`;
          }).join('')}
        </div>
        <div style="display:flex;gap:12px;margin-top:14px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:6px;font-size:12px"><div style="width:10px;height:10px;background:var(--success);border-radius:2px"></div>Available</div>
          <div style="display:flex;align-items:center;gap:6px;font-size:12px"><div style="width:10px;height:10px;background:var(--accent);border-radius:2px"></div>Today</div>
          <div style="font-size:11px;color:var(--text3)">Tap a day to toggle</div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="card">
          <div style="font-weight:700;margin-bottom:12px">Your Availability</div>
          ${avail.length === 0 ? `
          <div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">
            <div style="font-size:28px;margin-bottom:8px">📅</div>
            Tap days on the calendar to mark when you are available.
          </div>` : `
          <div style="display:flex;flex-direction:column;gap:2px;max-height:180px;overflow-y:auto">
            ${avail.slice().sort().slice(0,8).map(key => {
              const [y,m,d] = key.split('-').map(Number);
              const date = new Date(y, m, d);
              return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
                <span style="font-weight:500">${date.toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'})}</span>
                <button onclick="removeCalendarDay('${key}')" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:12px">✕</button>
              </div>`;
            }).join('')}
          </div>`}
          <button class="btn btn-outline btn-sm w-full mt-3" onclick="markThisWeekAvailable()">+ Mark this week available</button>
        </div>

        <div class="card">
          <div style="font-weight:700;margin-bottom:8px">Quick Settings</div>
          ${[['Available weekdays','calWeekdays'],['Weekend availability','calWeekends'],['Holiday blocks','calHolidays']].map(([label,key])=>`
          <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0">
            <span style="font-size:13px">${label}</span>
            <label class="toggle"><input type="checkbox" ${state[key]!==false?'checked':''} onchange="state['${key}']=this.checked;saveState();showToast('${label} updated','success')"/><span class="toggle-slider"></span></label>
          </div>`).join('')}
        </div>

        <div class="card">
          <div style="font-weight:700;margin-bottom:10px">Share Availability</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <button class="btn btn-outline btn-sm w-full" onclick="exportCalendarICS()">⬇ Download .ics File</button>
            <button class="btn btn-outline btn-sm w-full" onclick="copyCalendarLink()">🔗 Copy Booking Link</button>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleMsgSidebar() {
  const sidebar = document.querySelector('.msg-sidebar');
  if(sidebar) sidebar.classList.toggle('mobile-open');
}

function sendMsg() {
  const input = document.getElementById('msgInput');
  if(!input||!input.value.trim()) return;
  const conv = state.conversations.find(c=>c.id===state.activeConv);
  if(!conv) return;
  const msgContent = input.value.trim();
  const msg = {id:Date.now(),from:'own',text:msgContent,time:new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})};
  conv.messages.push(msg);
  conv.lastMsg = msg.text;
  conv.time = 'Just now';
  // Sync to Supabase if real user
  if(state.auth?.id && !String(state.auth.id).match(/^\d+$/) && conv.convId) {
    sbSendMessage(conv.convId, msgContent).catch(()=>{});
  }
  saveState();
  input.value = '';
  render();
  setTimeout(()=>{const b=document.getElementById('msgBody');if(b)b.scrollTop=b.scrollHeight;},50);
}

function savePortfolioItem(editId) {
  const title = document.getElementById('portTitle')?.value?.trim();
  if(!title) { showToast('Please enter a project title', 'warning'); return; }

  const item = {
    id: editId || Date.now(),
    title,
    category: document.getElementById('portCat')?.value || 'Other',
    year: document.getElementById('portYear')?.value || '2024',
    desc: document.getElementById('portDesc')?.value || '',
    link: document.getElementById('portLink')?.value || '',
    icon: document.getElementById('iconInput')?.value || '📈',
    bg: document.getElementById('colorInput')?.value || '#EEF2FF',
    color: document.getElementById('accentInput')?.value || '#0057FF',
  };

  if(!state.portfolio) state.portfolio = [];
  if(editId) {
    const idx = (state.portfolio||[]).findIndex(p=>p.id===editId);
    if(idx !== -1) state.portfolio[idx] = item;
  } else {
    if(!state.portfolio) state.portfolio=[]; state.portfolio.push(item);
  }
  if(state.auth?.id && !String(state.auth.id).match(/^\d+$/)) {
    sbSavePortfolioItem(item, editId||null).catch(err => console.warn('Portfolio sync:', err.message));
  }
  saveState();
  closeModal();
  showToast(editId ? 'Portfolio item updated!' : 'Portfolio item added! ✨', 'success'); if(!editId) addNotification('Portfolio item added — your profile looks stronger!', '🎨', 'portfolio');
  render();
}

function deletePortfolioItem(id) {
  if(!confirm('Remove this portfolio item?')) return;
  state.portfolio = (state.portfolio||[]).filter(p=>p.id!==id);
  saveState();
  closeModal();
  showToast('Portfolio item removed', 'info');
  render();
}

function renderBillingSettings() {
  const role = state.auth?.role || 'seeker';
  const currentPlan = state.auth?.plan || state.plan || 'starter';

  const seekerPlans = [
    {key:'starter', name:'Free', price:0, features:['3 job posts','Contact 5 providers/mo','Basic filters']},
    {key:'pro', name:'Growth', price:29, features:['Unlimited posts','Unlimited contacts','AI matching','Saved alerts','Advanced filters']},
    {key:'elite', name:'Enterprise', price:99, features:['Everything in Growth','Team seats (10)','Custom contracts','Dedicated manager','SSO & audit logs']},
  ];
  const providerPlans = [
    {key:'starter', name:'Free', price:0, features:['1 listing','5 proposals/mo','Basic placement']},
    {key:'pro', name:'Pro', price:49, features:['5 listings','Unlimited proposals','Priority placement','Verified badge','Spotlight boost','Analytics']},
    {key:'elite', name:'Agency', price:149, features:['Unlimited listings','Team seats (10)','Unlimited spotlight','Success manager','White-label contracts','API access']},
  ];

  const plans = role === 'provider' ? providerPlans : seekerPlans;
  // Map all plan name variants to keys
  const planKeyMap = {free:'starter',starter:'starter',pro:'pro',growth:'pro',elite:'elite',agency:'elite',enterprise:'elite'};
  const normalizedPlan = planKeyMap[currentPlan] || currentPlan;
  const currentPlanData = plans.find(p=>p.key===normalizedPlan) || plans[0];

  return `
  <div style="display:flex;flex-direction:column;gap:16px">

    <!-- Current plan summary -->
    <div class="card" style="background:linear-gradient(135deg,var(--accent)15,var(--purple)10);border-color:var(--accent)40">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:4px">Current Plan</div>
          <div style="font-size:22px;font-weight:900;font-family:var(--font-display)">${currentPlanData.name}</div>
          <div style="font-size:13px;color:var(--text3);margin-top:2px">${currentPlan==='starter'?'Free forever':'$'+currentPlanData.price+'/month · renews automatically'}</div>
        </div>
        ${currentPlan !== 'starter' ? `
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          <span class="badge badge-success">✓ Active</span>
          <button class="btn btn-ghost btn-sm" style="color:var(--danger);font-size:12px" onclick="openCancelPlanModal()">Cancel plan</button>
        </div>` : ''}
      </div>
      ${currentPlan !== 'starter' ? `
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <div style="font-size:12px;color:var(--text3);margin-bottom:6px;font-weight:600">Included in your plan:</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${currentPlanData.features.map(f=>`<span style="font-size:11px;padding:3px 8px;background:var(--success)20;color:var(--success);border-radius:100px;font-weight:500">✓ ${f}</span>`).join('')}
        </div>
      </div>` : ''}
    </div>

    <!-- Plan options -->
    <div class="card">
      <h3 style="margin-bottom:16px">${currentPlan === 'starter' ? 'Upgrade your plan' : 'Change plan'}</h3>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${plans.map(p => {
          const isCurrent = p.key === normalizedPlan;
          const isDowngrade = plans.indexOf(p) < plans.findIndex(x=>x.key===normalizedPlan);
          return `
          <div style="border:1.5px solid ${isCurrent?'var(--success)':p.key==='pro'?'var(--accent)':'var(--border)'};border-radius:var(--radius-lg);padding:14px;${isCurrent?'background:var(--success)08':''}">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
              <div style="display:flex;align-items:center;gap:10px">
                ${isCurrent ? '<span style="font-size:18px">✅</span>' : p.key==='pro' ? '<span style="font-size:18px">⭐</span>' : '<span style="font-size:18px">🏛</span>'}
                <div>
                  <div style="font-weight:700;display:flex;align-items:center;gap:6px">
                    ${p.name}
                    ${p.key==='pro' && !isCurrent ? '<span class="badge badge-accent" style="font-size:10px">Popular</span>' : ''}
                    ${isCurrent ? '<span class="badge badge-success" style="font-size:10px">Current</span>' : ''}
                  </div>
                  <div style="font-size:12px;color:var(--text3)">${p.price===0?'Free':('$'+p.price+'/mo')}</div>

                isDowngrade ?
                `<button class="btn btn-ghost btn-sm" onclick="openCancelPlanModal()">Downgrade</button>` :
                `<button class="btn ${p.key==='pro'?'btn-primary':'btn-outline'} btn-sm" onclick="upgradePlan('${p.name.toLowerCase()}')">Upgrade →</button>`
              }
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">
              ${p.features.map(f=>`<span style="font-size:11px;color:var(--text3);padding:2px 6px;background:var(--bg2);border-radius:4px">${f}</span>`).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- Payment method -->
    <div class="card">
      <h3 style="margin-bottom:14px">Payment Method</h3>
      ${currentPlan !== 'starter' ? `
      <div style="display:flex;align-items:center;gap:12px;background:var(--bg2);padding:14px;border-radius:var(--radius);margin-bottom:10px">
        <span style="font-size:24px">💳</span>
        <div><div style="font-weight:600">•••• •••• •••• 4242</div><div style="font-size:12px;color:var(--text3)">Expires 12/26</div></div>
        <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="openUpdatePaymentModal()">Update</button>
      </div>` : `
      <div style="text-align:center;padding:16px;color:var(--text3);font-size:13px">
        No payment method on file — upgrade to add one.
      </div>`}
    </div>

  </div>`;
}

function openQuote(providerId) {
  if(!state.auth) { navigate('auth'); return; }
  const p = state.providers.find(x=>x.id===providerId);
  if(!p) { showToast('Provider not found', 'error'); return; }
  openModal(
    '<div class="modal-header"><h3 class="modal-title">Contact ' + p.name + '</h3><button class="modal-close" onclick="closeModal()">✕</button></div>' +
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px;background:var(--surface-2);border-radius:12px">' +
    '<div class="avatar avatar-sm" style="background:#0057FF20;color:#0057FF">' + p.avatar + '</div>' +
    '<div><div style="font-weight:700">' + p.name + '</div><div style="font-size:13px;color:var(--text-2)">' + (p.title||p.category) + '</div></div></div>' +
    '<div style="display:flex;flex-direction:column;gap:14px">' +
    '<div class="input-wrap"><label class="label">Your message</label><textarea class="input textarea" id="quoteMessage" placeholder="Hi, I\'m interested in working with you..." style="min-height:100px"></textarea></div>' +
    '<div style="display:flex;gap:8px"><button class="btn btn-outline flex-1" onclick="closeModal()">Cancel</button>' +
    '<button class="btn btn-primary flex-1" onclick="sendContactMessage(\''+ p.id +'\',\''+ p.name +'\')">Send Message →</button></div></div>'
  );
}

async function sendContactMessage(providerId, providerName) {
  const message = document.getElementById('quoteMessage')?.value?.trim();
  if(!message) { showToast('Please write a message', 'warning'); return; }
  closeModal();
  showLoadingOverlay('Starting conversation...');
  try {
    await sbStartConversation(providerId, providerName);
    const conv = (state.conversations||[]).find(c => c.id === state.activeConv);
    if(conv) await sbSendMessage(conv.id, message);
    hideLoadingOverlay();
    showToast('Message sent to ' + providerName + '! 💬', 'success');
    navigate('messages');
  } catch(err) {
    hideLoadingOverlay();
    showToast('Error: ' + err.message, 'error');
  }
}

async function saveListing() {
  const title = document.getElementById('listingTitle')?.value?.trim();
  if(!title) { showToast('Please enter a service title', 'warning'); return; }
  const category = document.getElementById('listingCategory')?.value || 'General';
  const bio = document.getElementById('listingBio')?.value || '';
  const rate = document.getElementById('listingRate')?.value || '';
  const tagsRaw = document.getElementById('listingTags')?.value || '';
  const tags = tagsRaw.split(',').map(t=>t.trim()).filter(Boolean);
  if(state.auth?.id && !String(state.auth.id).match(/^\d+$/)) {
    try {
      const client = await initSupabase();
      await client.from('providers').upsert({id: state.auth.id, title, category, bio, rate, tags, available: true});
      await client.from('profiles').update({category, bio, rate, tags}).eq('id', state.auth.id);
      await loadProviders();
      closeModal();
      showToast('Listing published! You are now visible to seekers. 🎉', 'success');
      addNotification('Your listing is live — seekers can find you in search', '📋', 'listing');
      render();
    } catch(err) { showToast('Error: ' + err.message, 'error'); }
  } else {
    closeModal();
    showToast('Listing created! (Demo mode)', 'success');
  }
}

function renderNotifPanel() {
  const notifs = state.notifications || [];
  const unread = notifs.filter(n=>!n.read).length;
  return `
  <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
    <div style="font-weight:700;font-size:14px">Notifications ${unread>0?`<span class="badge badge-accent" style="font-size:10px;padding:1px 6px">${unread}</span>`:''}</div>
    <button class="btn btn-ghost btn-sm" onclick="markAllRead()">Mark all read</button>
  </div>
  <div style="max-height:360px;overflow-y:auto">
  ${notifs.length===0 ? `<div style="padding:32px;text-align:center;color:var(--text3);font-size:13px">No notifications yet</div>` :
    notifs.map(n=>`
    <div class="notif-item ${n.read?'':'unread'}" onclick="n && markNotifRead(${n.id})">
      <div style="font-size:18px;width:34px;height:34px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0">${n.icon}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:${n.read?'400':'600'};line-height:1.4">${n.text}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${n.time}</div>
      </div>
      ${!n.read?'<div class="notif-dot-badge"></div>':''}
    </div>`).join('')}
  </div>
  <div style="padding:10px 16px;border-top:1px solid var(--border);text-align:center">
    <button class="btn btn-ghost btn-sm w-full" onclick="markAllRead()">Clear all notifications</button>
  </div>`;
}

function addNotification(text, icon='🔔', type='info') {
  const notif = {id: Date.now(), text, icon, time:'Just now', read:false, type};
  if(!state.notifications) state.notifications = [];
  state.notifications.unshift(notif);
  if(state.notifications.length > 20) state.notifications = state.notifications.slice(0,20);
  saveState();
  // Update nav bell without full re-render
  const dot = document.querySelector('.notif-dot');
  if(dot) dot.style.display = 'block';
  // Refresh panel if open
  const panel = document.getElementById('notifPanel');
  if(panel && !panel.classList.contains('hidden')) panel.innerHTML = renderNotifPanel();
  // Play sound
  const soundMap = {message:'message', success:'success', pitch:'success', contract:'success'};
  playNotifSound(soundMap[type] || 'default');
}

function markNotifRead(id) {
  const n = (state.notifications||[]).find(x=>x.id===id);
  if(n) { n.read=true; saveState(); }
  const panel = document.getElementById('notifPanel');
  if(panel && !panel.classList.contains('hidden')) panel.innerHTML = renderNotifPanel();
  // Update bell dot
  const unread = (state.notifications||[]).filter(n=>!n.read).length;
  const dot = document.querySelector('.notif-dot');
  if(dot) dot.style.display = unread > 0 ? 'block' : 'none';
}

function markAllRead() {
  state.notifications.forEach(n=>n.read=true);
  saveState(); render();
}

function renderReviewsSection(p) {

  const ratingBreakdown = [5,4,3,2,1].map(star => ({
    star, count: reviews.filter(r=>r.rating===star).length,

  return `

      <div style="font-size:12px;color:var(--text3)">${reviews.length} reviews</div>
    </div>
    <div>
      ${ratingBreakdown.map(r=>`
      <div class="rating-bar-row">
        <div style="font-size:12px;color:var(--text3);width:14px">${r.star}</div>

  }
}
function hoverStars(n) {
  for(let i=1;i<=5;i++) {
    const el = document.getElementById('rstar'+i);
    if(el) el.style.opacity = i<=n ? '1' : '0.3';
  }
}
function unhoverStars() {
  const current = parseInt(document.getElementById('reviewRating')?.value||'0');
  for(let i=1;i<=5;i++) {
    const el = document.getElementById('rstar'+i);
    if(el) el.style.opacity = i<=current ? '1' : '0.3';
  }

  if(!state.providerReviews) state.providerReviews = {};
  if(!state.providerReviews[providerId]) state.providerReviews[providerId] = [];
  state.providerReviews[providerId].unshift({
    id: Date.now(), reviewer: state.auth?.name||'You', avatar: state.auth?.avatar||'U',
    rating, text, date: 'Just now', helpful: 0
  });
  // Update provider's review count
  const p = state.providers.find(x=>x.id===providerId);
  if(p) p.reviews = (p.reviews||0)+1;
  if(state.auth?.id && !String(state.auth.id).match(/^\d+$/)) {
    sbSubmitReview(providerId, rating, text).catch(err => console.warn('Review sync:', err.message));

  saveState();
  closeModal();
  showToast('Review submitted! Thank you. ⭐', 'success');
  addNotification('Your review was posted', '⭐', 'review');

}

// ── CORE FETCH HELPERS ────────────────────────────────────────
function sbHeaders(extra={}) {
  const h = {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_ANON,
    'Authorization': 'Bearer ' + (_sbSession?.access_token || SUPABASE_ANON),
    ...extra
  };
  return h;
}

async function sbFetch(path, options={}) {
  const fullUrl = SUPABASE_URL + path;
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    const method = options.method || 'GET';
    xhr.open(method, fullUrl);
    const headers = { ...sbHeaders(), ...(options.headers||{}) };
    Object.entries(headers).forEach(([k,v]) => { try { xhr.setRequestHeader(k, v); } catch(e){} });
    xhr.onload = () => {
      const text = xhr.responseText;
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch(e) { data = text; }
      if(xhr.status >= 400) reject(new Error((data && (data.message || data.error_description || data.msg)) || 'Request failed ' + xhr.status));
      else resolve(data);
    };
    xhr.onerror = () => reject(new Error('Network error — URL: ' + fullUrl));
    xhr.ontimeout = () => reject(new Error('Timeout'));
    xhr.timeout = 15000;
    xhr.send(options.body || null);
  });
}

async function sbRpc(fn, body={}) {
  return sbFetch('/rest/v1/rpc/' + fn, { method:'POST', body: JSON.stringify(body) });
}

function saveSession(session) {
  _sbSession = session;
  if(session) localStorage.setItem('sb_session', JSON.stringify(session));
  else localStorage.removeItem('sb_session');
}

function loadSession() {
  try {
    const s = localStorage.getItem('sb_session');
    if(s) { _sbSession = JSON.parse(s); return _sbSession; }
  } catch(e) {}
  return null;
}

async function refreshSession() {
  if(!_sbSession?.refresh_token) return false;
  try {
    const data = await sbFetch('/auth/v1/token?grant_type=refresh_token', {
      method: 'POST',
      body: JSON.stringify({ refresh_token: _sbSession.refresh_token })
    });
    saveSession(data);
    return true;
  } catch(e) {
    saveSession(null);
    return false;
  }
}

        xhr.ontimeout = () => reject(new Error('Timeout'));
        xhr.timeout = 10000;
        xhr.send(JSON.stringify({ email, password, data: { name, role, entity_type: entityType } }));
      });
    } catch(fetchErr) {
      if(fetchErr.message && fetchErr.message.includes('422')) {
        hideLoadingOverlay();
        showToast('Account already exists - signing you in...', 'info');
        try { await sbSignIn(email, password); } catch(e) { showToast('Try logging in instead', 'warning'); }
        return;
      }
      hideLoadingOverlay();
      showToast('Signup error: ' + fetchErr.message, 'error');
      return;
    }

    hideLoadingOverlay();

    // Store all signup data to use after OTP verification
    _pendingSignup = { email, password, name, role, entityType, session: data };
    localStorage.setItem('pf_otp_email', email);

    // Show OTP verification modal
    showOTPVerificationModal(email, name);

  } catch(err) {
    hideLoadingOverlay();
    showToast('Signup error: ' + (err.message || JSON.stringify(err)), 'error');
    console.error('sbSignUp error:', err);
    throw err;
  }
}

// Modified otpInput to handle both signup and login flows
function otpInput(el, idx, flow) {
  el.value = el.value.toString().slice(-1).replace(/[^0-9]/g,'');
  if(el.value && idx < 7) {
    document.getElementById('otp' + (idx+1))?.focus();
  }
  if(idx === 7 && el.value) {
    const code = [0,1,2,3,4,5,6,7].map(i => document.getElementById('otp'+i)?.value || '').join('');
    if(code.length === 8) {
      setTimeout(() => {
        if(flow === 'signup') verifySignupOTP(localStorage.getItem('pf_otp_email'));
        else verifyOTP(localStorage.getItem('pf_otp_email'));
      }, 200);
    }
  }
}

async function verifySignupOTP(email) {
  const code = [0,1,2,3,4,5,6,7].map(i => document.getElementById('otp'+i)?.value || '').join('');
  if(code.length < 8) { showToast('Enter all 6 digits', 'warning'); return; }

  const btn = document.getElementById('otpVerifyBtn');
  if(btn) { btn.disabled = true; btn.textContent = 'Verifying...'; }

  try {
    const data = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', SUPABASE_URL + '/auth/v1/verify');
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('apikey', SUPABASE_ANON);
      xhr.onload = () => {
        try {
          const res = JSON.parse(xhr.responseText);
          if(xhr.status >= 400) reject(new Error(res.message || res.error_description || 'Invalid code'));
          else resolve(res);
        } catch(e) { reject(new Error('Parse error')); }
      };
      xhr.onerror = () => reject(new Error('Network error'));
      xhr.timeout = 10000;
      xhr.send(JSON.stringify({ email, token: code, type: 'email' }));
    });

    // OTP verified - now create the profile
    const pending = _pendingSignup;
    if(pending) {
      const session = data.access_token ? data : pending.session;
      saveSession(session);
      const userId = data.user?.id || pending.session?.user?.id;

      if(userId) {
        const initials = pending.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
        await sbFetch('/rest/v1/profiles', {
          method: 'POST',
          headers: { 'Prefer': 'return=minimal,resolution=merge-duplicates', 'Authorization': 'Bearer ' + (session.access_token || SUPABASE_ANON) },
          body: JSON.stringify({ id: userId, name: pending.name, email: pending.email, role: pending.role, entity_type: pending.entityType, avatar: initials, plan: 'starter', is_admin: false })
        }).catch(()=>{});

        if(pending.role === 'provider') {
          await sbFetch('/rest/v1/providers', {
            method: 'POST',
            headers: { 'Prefer': 'return=minimal,resolution=merge-duplicates', 'Authorization': 'Bearer ' + (session.access_token || SUPABASE_ANON) },
            body: JSON.stringify({ id: userId, entity_type: pending.entityType, available: true, rating: 5.0, review_count: 0 })
          }).catch(()=>{});
        }
      }
      _pendingSignup = null;
    }

    localStorage.removeItem('pf_otp_email');
    closeModal();
    showLoadingOverlay('Setting up your account...');
    const userId = data.user?.id || _pendingSignup?.session?.user?.id;
    await loadUserProfile({ id: userId, email });
    hideLoadingOverlay();
    const firstName = (pending?.name || email).split(' ')[0].split('@')[0];
    showToast('Welcome to ProFinder, ' + firstName + '! 🎉', 'success');
    navigate((pending?.role || state.auth?.role) === 'provider' ? 'provider' : 'seeker');

  } catch(err) {
    if(btn) { btn.disabled = false; btn.textContent = 'Verify Code →'; }
    const boxes = document.getElementById('otpBoxes');
    if(boxes) {
      [0,1,2,3,4,5].forEach(i => {
        const b = document.getElementById('otp'+i);
        if(b) { b.value = ''; b.style.borderColor = 'var(--danger)'; }
      });
      document.getElementById('otp0')?.focus();
      setTimeout(() => {
        [0,1,2,3,4,5].forEach(i => {
          const b = document.getElementById('otp'+i);
          if(b) b.style.borderColor = 'var(--border)';
        });
      }, 1500);
    }
    showToast(err.message.includes('expired') ? 'Code expired — tap Resend' : 'Wrong code — try again', 'error');
  }
}

async function sbSignIn(email, password) {
  showLoadingOverlay('Signing in...');
  try {
    let data;
    try {
      data = await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', SUPABASE_URL + '/auth/v1/token?grant_type=password');
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.setRequestHeader('apikey', SUPABASE_ANON);
        xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_ANON);
        xhr.onload = () => {
          try {
            const res = JSON.parse(xhr.responseText);
            if(xhr.status >= 400) reject(new Error(res.message || res.error_description || 'Login failed ' + xhr.status));
            else resolve(res);
          } catch(e) { reject(new Error('Parse error')); }
        };
        xhr.onerror = () => reject(new Error('Network error'));
        xhr.timeout = 10000;
        xhr.ontimeout = () => reject(new Error('Timeout'));
        xhr.send(JSON.stringify({ email, password }));
      });
    } catch(fetchErr) {
      hideLoadingOverlay();
      await sendMagicLink(email, null, null, null, true);
      return;
    }
    saveSession(data);
    await loadUserProfile({ id: data.user?.id, email });
    hideLoadingOverlay();
    showToast('Welcome back! 👋', 'success');
    navigate(state.auth?.role === 'provider' ? 'provider' : 'seeker');
  } catch(err) {
    hideLoadingOverlay();
    showToast(err.message || 'Login failed', 'error');
    throw err;
  }
}

async function sbSignOut() {
  try {

async function loadUserProfile(user) {
  try {
    const profiles = await sbFetch('/rest/v1/profiles?id=eq.' + user.id + '&select=*');
    const profile = Array.isArray(profiles) ? profiles[0] : profiles;
    if(profile) {
      const authObj = {
        id: profile.id, name: profile.name, email: profile.email,
        role: profile.role, entityType: profile.entity_type,
        avatar: profile.avatar, avatarUrl: profile.avatar_url || null,
        plan: profile.plan || 'starter', title: profile.title || '',
        bio: profile.bio || '', rate: profile.rate || '',
        location: profile.location || '', website: profile.website || '',
        linkedin: profile.linkedin || '',
        isAdmin: profile.is_admin || false, verified: profile.verified || false
      };
      setState({ auth: authObj });
      await loadUserData();
      // If no role set (new Google OAuth user), send them through onboarding
      if(!profile.role) {
        authStep = 2; // skip step 1 (they already have email/name)
        authMode = 'signup';
        navigate('auth');
        showToast('Welcome! Please complete your profile setup.', 'info');
      }
    } else {
      // New Google user - no profile yet, start onboarding
      authStep = 1;
      authMode = 'signup';
      navigate('auth');
    }
  } catch(e) {
    console.warn('Could not load profile:', e.message);
  }
}

async function loadUserData() {
  await Promise.all([loadNotifications(), loadConversations(), loadSavedProviders(), loadProviders()]);
  if(state.auth?.role === 'seeker') {
    await Promise.all([loadBriefs(), loadPostedJobs(), loadContracts()]);
  } else if(state.auth?.role === 'provider') {
    await Promise.all([loadBriefs(), loadProposals(), loadContracts(), loadPortfolio()]);
  }
  render();
}

async function loadConversations() {
  if(!state.auth?.id || String(state.auth.id).match(/^\d+$/)) return;
  try {
    const data = await dbSelect('conversations',
      'select=*,pa:profiles!conversations_participant_a_fkey(name,avatar,entity_type),pb:profiles!conversations_participant_b_fkey(name,avatar,entity_type)' +
      '&or=(participant_a.eq.' + state.auth.id + ',participant_b.eq.' + state.auth.id + ')' +
      '&order=last_message_at.desc'
    );
    if(data && data.length > 0) {
      state.conversations = await Promise.all(data.map(async c => {
        const isA = c.participant_a === state.auth.id;
        const other = isA ? c.pb : c.pa;
        let messages = [];
        try {
          const msgs = await dbSelect('messages', 'conversation_id=eq.' + c.id + '&order=created_at.asc&limit=50');
          messages = (msgs||[]).map(m => ({
            id: m.id, from: m.sender_id === state.auth.id ? 'own' : 'them',
            text: m.content, time: formatTime(m.created_at)
          }));
        } catch(e) {}
        const unread = messages.filter(m => m.from === 'them').length;
        return {
          id: c.id, convId: c.id, name: other?.name || 'User',
          role: other?.entity_type || 'User', avatar: other?.avatar || '??',
          color: '#0057FF', lastMsg: c.last_message || '', time: timeAgo(c.last_message_at),
          unread, messages
        };
      }));
      saveState();
    }
  } catch(e) { console.warn('loadConversations:', e.message); }
}

async function sbSendMessage(convId, content) {
  const conv = (state.conversations||[]).find(c => c.id === convId);
  if(!conv) return;
  try {
    const convData = await dbSelect('conversations', 'id=eq.' + convId);
    const c = Array.isArray(convData) ? convData[0] : convData;
    const receiverId = c?.participant_a === state.auth.id ? c?.participant_b : c?.participant_a;
    await dbInsert('messages', {
      conversation_id: convId, sender_id: state.auth.id,
      receiver_id: receiverId, content
    });
    await dbUpdate('conversations', { last_message: content, last_message_at: new Date().toISOString() }, 'id=eq.' + convId);
    await loadConversations();
    // Notify receiver
    try {
      if(receiverId) {
        const receiverProfiles = await dbSelect('profiles', 'id=eq.' + receiverId + '&select=email,name');
        const receiver = receiverProfiles && receiverProfiles[0];
        if(receiver) await notifyNewMessage(receiver.email, state.auth.name);
      }
    } catch(e) { console.warn('Message notification failed:', e.message); }
  } catch(e) { console.warn('sbSendMessage:', e.message); }
}

async function sbStartConversation(providerId, providerName) {
  try {
    const existing = await dbSelect('conversations',
      'or=(and(participant_a.eq.' + state.auth.id + ',participant_b.eq.' + providerId + '),and(participant_a.eq.' + providerId + ',participant_b.eq.' + state.auth.id + '))&limit=1'
    );
    if(existing && existing.length > 0) {
      state.activeConv = existing[0].id;
      await loadConversations();
      navigate('messages');
      return;
    }
    const data = await dbInsert('conversations', {
      participant_a: state.auth.id, participant_b: providerId, last_message: 'Conversation started'
    }, 'representation');
    const conv = Array.isArray(data) ? data[0] : data;
    state.activeConv = conv.id;
    await loadConversations();
    navigate('messages');
  } catch(e) { console.warn('sbStartConversation:', e.message); }
}

  if(!state.auth?.id || String(state.auth.id).match(/^\d+$/)) return;
  try {
    const data = await dbSelect('saved_providers', 'user_id=eq.' + state.auth.id + '&select=provider_id');
    if(data) { state.savedProviders = data.map(r => r.provider_id); saveState(); }
  } catch(e) {}
}

async function sbToggleSave(providerId) {
  const saved = (state.savedProviders||[]).includes(providerId);
  if(saved) {
    await dbDelete('saved_providers', 'user_id=eq.' + state.auth.id + '&provider_id=eq.' + providerId);
    state.savedProviders = (state.savedProviders||[]).filter(id => id !== providerId);
    showToast('Removed from saved', 'info');
  } else {
    await dbInsert('saved_providers', { user_id: state.auth.id, provider_id: providerId });
    (state.savedProviders = state.savedProviders||[]).push(providerId);
    showToast('Provider saved! 🔖', 'success');
    addNotification('You saved a provider to your list', '🔖', 'save');
  }
  saveState(); render();
}

// ── REVIEWS ───────────────────────────────────────────────────
async function sbSubmitReview(providerId, rating, text) {
  await dbInsert('reviews', {
    provider_id: providerId, reviewer_id: state.auth.id, rating, content: text
  });
  try {
    const reviews = await dbSelect('reviews', 'provider_id=eq.' + providerId + '&select=rating');
    if(reviews && reviews.length > 0) {
      const avg = reviews.reduce((a, r) => a + r.rating, 0) / reviews.length;
      await dbUpdate('providers', { rating: parseFloat(avg.toFixed(1)), review_count: reviews.length }, 'id=eq.' + providerId);
    }
  } catch(e) {}
}

// ── HELPERS ───────────────────────────────────────────────────
function timeAgo(dateStr) {
  if(!dateStr) return 'recently';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if(mins < 1) return 'Just now';
  if(mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if(days < 7) return days + 'd ago';
  return new Date(dateStr).toLocaleDateString();
}

function formatTime(dateStr) {
  if(!dateStr) return '';
  return new Date(dateStr).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

async function liveSearch(query) {
  if(!query || query.length < 2) { await loadProviders(); render(); return; }
  if(!state.auth?.id || String(state.auth.id).match(/^\d+$/)) return;
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(async () => {
    try {
      const data = await dbSelect('providers',
        'select=*,profiles(name,avatar,entity_type,verified)' +
        '&or=(title.ilike.*' + encodeURIComponent(query) + '*,category.ilike.*' + encodeURIComponent(query) + '*,bio.ilike.*' + encodeURIComponent(query) + '*)' +
        '&available=eq.true'
      );
      if(data) {
        state.providers = data.map(p => ({
          id: p.id, name: p.profiles?.name || 'Provider', title: p.title || 'Professional',
          category: p.category || 'General', entityType: p.entity_type || p.profiles?.entity_type,
          rating: p.rating || 5.0, reviews: p.review_count || 0, rate: p.rate || 'Contact for rate',
          verified: p.verified || p.profiles?.verified, avatar: p.profiles?.avatar || '??',
          color: '#0057FF', tags: p.tags || [], available: p.available, bio: p.bio || '',
          packages: [{name:'Starter',price:499,desc:'Initial engagement'},{name:'Pro',price:1999,desc:'Full project'},{name:'Elite',price:4999,desc:'Ongoing retainer'}]
        }));
        saveState(); render();
      }
    } catch(e) { console.warn('liveSearch:', e.message); }
  }, 350);
}

// ── MAGIC LINK AUTH ──────────────────────────────────────────
async function sendMagicLink(email, name, role, entityType, isLogin=false) {
  // Store pending signup data
  if(!isLogin && name) {
    localStorage.setItem('pf_pending_signup', JSON.stringify({ name, role, entityType, email }));
  }
  localStorage.setItem('pf_otp_email', email);

  // Send OTP via Supabase — user gets a 6-digit code in their email
  try {
    await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', SUPABASE_URL + '/auth/v1/otp');
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('apikey', SUPABASE_ANON);
      xhr.onload = () => resolve(xhr.responseText);
      xhr.onerror = () => reject(new Error('Network error'));
      xhr.timeout = 10000;
      xhr.ontimeout = () => reject(new Error('Timeout'));
      xhr.send(JSON.stringify({
        email,
        options: { shouldCreateUser: true }
      }));
    });
  } catch(e) {
    console.warn('OTP send error:', e.message);
  }

  // Show OTP entry modal
  openModal(`
    <div style="text-align:center;padding:24px 16px">
      <div style="font-size:52px;margin-bottom:12px">📬</div>
      <h3 style="font-size:20px;font-weight:800;margin-bottom:6px">Check your email</h3>
      <p style="color:var(--text3);font-size:14px;line-height:1.6;margin-bottom:20px">
        We sent a 6-digit code to<br>
        <strong style="color:var(--accent)">${email}</strong>
      </p>

      <!-- OTP input boxes -->
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:20px" id="otpBoxes">
        ${[0,1,2,3,4,5,6,7].map(i => `
        <input id="otp${i}" type="number" maxlength="1" inputmode="numeric"
          style="width:44px;height:52px;text-align:center;font-size:22px;font-weight:700;
                 border:2px solid var(--border);border-radius:10px;background:var(--bg2);
                 color:var(--text);outline:none;font-family:var(--font-display)"
          oninput="otpInput(this,${i},'login')"
          onkeydown="otpKeydown(this,${i},event)"
          onfocus="this.style.borderColor='var(--accent)'"
          onblur="this.style.borderColor='var(--border)'"
        />`).join('')}
      </div>

      <button class="btn btn-primary w-full" id="otpVerifyBtn" onclick="verifyOTP('${email}')" style="margin-bottom:12px">
        Verify Code →
      </button>
      <button class="btn btn-ghost btn-sm w-full" onclick="resendOTP('${email}')">
        Resend code
      </button>
      <div style="margin-top:12px;font-size:12px;color:var(--text4)">
        Code expires in 10 minutes · Check spam if not received
      </div>
    </div>
  `);

  // Auto-focus first box
  setTimeout(() => document.getElementById('otp0')?.focus(), 100);
}

function otpInput(el, idx) {
  // Only allow single digit
  el.value = el.value.toString().slice(-1).replace(/[^0-9]/g,'');
  el.style.borderColor = el.value ? 'var(--accent)' : 'var(--border)';
  // Auto advance
  if(el.value && idx < 7) {
    document.getElementById('otp' + (idx+1))?.focus();
  }
  // Auto submit when all 6 filled
  if(idx === 7 && el.value) {
    const code = [0,1,2,3,4,5,6,7].map(i => document.getElementById('otp'+i)?.value || '').join('');
    if(code.length === 8) {
      setTimeout(() => verifyOTP(localStorage.getItem('pf_otp_email')), 200);
    }
  }
}

function otpKeydown(el, idx, e) {
  if(e.key === 'Backspace' && !el.value && idx > 0) {
    document.getElementById('otp' + (idx-1))?.focus();
  }
}

async function resendOTP(email) {
  try {
    await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', SUPABASE_URL + '/auth/v1/otp');
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('apikey', SUPABASE_ANON);
      xhr.onload = () => resolve();
      xhr.onerror = () => reject();
      xhr.timeout = 8000;
      xhr.send(JSON.stringify({ email, options: { shouldCreateUser: true } }));
    });
    showToast('New code sent! Check your email. 📧', 'success');
  } catch(e) {
    showToast('Could not resend — try again', 'warning');
  }
}

async function verifyOTP(email) {
  const code = [0,1,2,3,4,5,6,7].map(i => document.getElementById('otp'+i)?.value || '').join('');
  if(code.length < 8) { showToast('Enter all 6 digits', 'warning'); return; }

  const btn = document.getElementById('otpVerifyBtn');
  if(btn) { btn.disabled = true; btn.textContent = 'Verifying...'; }

  try {
    const data = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', SUPABASE_URL + '/auth/v1/verify');
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('apikey', SUPABASE_ANON);
      xhr.onload = () => {
        try {
          const res = JSON.parse(xhr.responseText);
          if(xhr.status >= 400) reject(new Error(res.message || res.error_description || 'Invalid code'));
          else resolve(res);
        } catch(e) { reject(new Error('Parse error')); }
      };
      xhr.onerror = () => reject(new Error('Network error'));
      xhr.timeout = 10000;
      xhr.send(JSON.stringify({ email, token: code, type: 'email' }));
    });

    saveSession(data);
    localStorage.removeItem('pf_otp_email');
    closeModal();
    showLoadingOverlay('Setting up your account...');

    const pending = localStorage.getItem('pf_pending_signup');
    const pendingData = pending ? JSON.parse(pending) : null;

    const userData = await sbFetch('/auth/v1/user');
    const name = pendingData?.name || userData.user_metadata?.name || userData.email.split('@')[0];
    const role = pendingData?.role || userData.user_metadata?.role || null;
    const entityType = pendingData?.entityType || userData.user_metadata?.entity_type || 'individual';

    if(pending) localStorage.removeItem('pf_pending_signup');

    const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

    await sbFetch('/rest/v1/profiles', {
      method: 'POST',
      headers: { 'Prefer': 'return=minimal,resolution=merge-duplicates' },
      body: JSON.stringify({ id: userData.id, name, email: userData.email, role: role||'seeker', entity_type: entityType, avatar: initials, plan: 'starter', is_admin: false })
    }).catch(()=>{});

    await loadUserProfile({ id: userData.id, email: userData.email });
    hideLoadingOverlay();

    if(!role) {
      showToast('Welcome! Let us set up your account. 🎉', 'success');
      authStep = 2;
      authMode = 'signup';
      navigate('auth');
    } else {
      showToast('Welcome back! 👋', 'success');
      navigate(role === 'provider' ? 'provider' : 'seeker');
    }
  } catch(err) {
    if(btn) { btn.disabled = false; btn.textContent = 'Verify Code →'; }
    // Shake the boxes on error
    const boxes = document.getElementById('otpBoxes');
    if(boxes) { boxes.style.animation = 'shake 0.3s ease'; setTimeout(()=>boxes.style.animation='',400); }
    showToast(err.message.includes('expired') ? 'Code expired — request a new one' : 'Incorrect code — try again', 'error');
  }
}

// Handle magic link redirect on page load
function handleMagicLinkReturn() {
  const hash = window.location.hash;
  const search = window.location.search;
  
  // Check both hash and query params (Supabase uses both depending on flow)
  let accessToken = null;
  let refreshToken = null;
  
  if(hash && hash.includes('access_token')) {
    const params = new URLSearchParams(hash.replace('#', ''));
    accessToken = params.get('access_token');
    refreshToken = params.get('refresh_token');
  } else if(search && search.includes('access_token')) {
    const params = new URLSearchParams(search.replace('?', ''));
    accessToken = params.get('access_token');
    refreshToken = params.get('refresh_token');
  }
  
  if(!accessToken) return;
  
  // Clean URL
  window.history.replaceState({}, '', window.location.pathname);
  
  saveSession({ access_token: accessToken, refresh_token: refreshToken });
  _sbSession = { access_token: accessToken, refresh_token: refreshToken };
  
  showLoadingOverlay('Setting up your account...');
  
  const pending = localStorage.getItem('pf_pending_signup');
  
  sbFetch('/auth/v1/user').then(async userData => {
    // Create or update profile
    const pendingData = pending ? JSON.parse(pending) : null;
    const name = pendingData?.name || userData.user_metadata?.name || userData.email.split('@')[0];
    const role = pendingData?.role || userData.user_metadata?.role || 'seeker';
    const entityType = pendingData?.entityType || userData.user_metadata?.entity_type || 'individual';
    
    if(pending) localStorage.removeItem('pf_pending_signup');
    
    const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    
    // Upsert profile
    await sbFetch('/rest/v1/profiles', {
      method: 'POST',
      headers: { 'Prefer': 'return=minimal,resolution=merge-duplicates' },
      body: JSON.stringify({ id: userData.id, name, email: userData.email, role, entity_type: entityType, avatar: initials, plan: 'starter', is_admin: false })
    }).catch(()=>{});
    
    if(role === 'provider') {
      await sbFetch('/rest/v1/providers', {
        method: 'POST',
        headers: { 'Prefer': 'return=minimal,resolution=merge-duplicates' },
        body: JSON.stringify({ id: userData.id, entity_type: entityType, available: true, rating: 5.0, review_count: 0 })
      }).catch(()=>{});
    }
    
    await loadUserProfile({ id: userData.id, email: userData.email });
    hideLoadingOverlay();
    // If new user with no role, go through onboarding
    if(!state.auth?.role) {
      showToast('Welcome! Let us set up your account.', 'success');
      authStep = 2;
      authMode = 'signup';
      navigate('auth');
    } else {
      showToast('Welcome back! 👋', 'success');
      const dest = state.auth?.role === 'provider' ? 'provider' : 'seeker';
      navigate(dest);
    }
  }).catch(e => {
    hideLoadingOverlay();
    console.warn('Magic link return error:', e.message);
    // Try to show something useful
    showToast('Sign in error: ' + e.message, 'error');
  });
}

// ── FILE UPLOADS ─────────────────────────────────────────────
async function uploadAvatar(input) {
  const file = input.files[0];
  if(!file) return;
  if(file.size > 5 * 1024 * 1024) { showToast('Image must be under 5MB', 'warning'); return; }
  showLoadingOverlay('Uploading photo...');
  try {
    const ext = file.name.split('.').pop();
    const path = 'avatars/' + state.auth.id + '.' + ext;
    const arrayBuf = await file.arrayBuffer();
    const res = await fetch(SUPABASE_URL + '/storage/v1/object/avatars/' + state.auth.id + '.' + ext, {
      method: 'POST',
      headers: {
        ...sbHeaders(),
        'Content-Type': file.type,
        'x-upsert': 'true'
      },
      body: arrayBuf
    });
    if(!res.ok) {
      // Storage bucket may not exist, fall back to base64 in profile
      const reader = new FileReader();
      reader.onload = async (e) => {
        const base64 = e.target.result;
        await dbUpdate('profiles', { avatar_url: base64 }, 'id=eq.' + state.auth.id).catch(()=>{});
        state.auth.avatarUrl = base64;
        saveState(); render();
        hideLoadingOverlay();
        showToast('Profile photo updated! 📸', 'success');
      };
      reader.readAsDataURL(file);
      return;
    }
    const avatarUrl = SUPABASE_URL + '/storage/v1/object/public/avatars/' + state.auth.id + '.' + ext;
    await dbUpdate('profiles', { avatar_url: avatarUrl }, 'id=eq.' + state.auth.id).catch(()=>{});
    state.auth.avatarUrl = avatarUrl;
    saveState(); render();
    hideLoadingOverlay();
    showToast('Profile photo updated! 📸', 'success');
  } catch(err) {
    hideLoadingOverlay();
    showToast('Upload failed: ' + err.message, 'error');
  }
}

// ── INIT ON LOAD ──────────────────────────────────────────────
async function initApp() {
  const session = loadSession();
  if(session?.access_token) {
    _sbSession = session;
    try {
      const userData = await sbFetch('/auth/v1/user');
      await loadUserProfile({ id: userData.id, email: userData.email });
      render();
    } catch(e) {
      // Token expired, try refresh
      const refreshed = await refreshSession();
      if(refreshed) {
        try {
          const userData = await sbFetch('/auth/v1/user');
          await loadUserProfile({ id: userData.id, email: userData.email });
          render();
        } catch(e2) {
          saveSession(null);
        }
      }
    }
  }
  // Handle OAuth redirect (hash contains access_token)
  const hash = window.location.hash;
  if(hash && hash.includes('access_token')) {
    const params = new URLSearchParams(hash.replace('#', ''));
    const fakeSession = {
      access_token: params.get('access_token'),
      refresh_token: params.get('refresh_token')
    };
    saveSession(fakeSession);
    try {
      const userData = await sbFetch('/auth/v1/user');
      await loadUserProfile({ id: userData.id, email: userData.email });
      window.location.hash = '';
      render();
    } catch(e) { console.warn('OAuth init failed:', e.message); }
  }
}

async function deleteAccount() {
  closeModal();
  showLoadingOverlay('Deleting your account...');
  try {
    const userId = state.auth?.id;
    if(userId && !String(userId).match(/^\d+$/)) {
      // Delete all user data from Supabase
      await Promise.allSettled([
        dbDelete('messages', 'sender_id=eq.' + userId),
        dbDelete('messages', 'receiver_id=eq.' + userId),
        dbDelete('notifications', 'user_id=eq.' + userId),
        dbDelete('saved_providers', 'user_id=eq.' + userId),
        dbDelete('pitches', 'provider_id=eq.' + userId),
        dbDelete('proposals', 'provider_id=eq.' + userId),
        dbDelete('portfolio', 'provider_id=eq.' + userId),
        dbDelete('reviews', 'reviewer_id=eq.' + userId),
        dbDelete('briefs', 'author_id=eq.' + userId),
        dbDelete('jobs', 'poster_id=eq.' + userId),
      ]);
      // Delete conversations
      await dbDelete('conversations', 'participant_a=eq.' + userId).catch(()=>{});
      await dbDelete('conversations', 'participant_b=eq.' + userId).catch(()=>{});
      // Delete provider listing
      await dbDelete('providers', 'id=eq.' + userId).catch(()=>{});
      // Delete contracts
      await dbDelete('contracts', 'seeker_id=eq.' + userId).catch(()=>{});
      await dbDelete('contracts', 'provider_id=eq.' + userId).catch(()=>{});
      // Delete profile
      await dbDelete('profiles', 'id=eq.' + userId).catch(()=>{});
      // Delete auth user
      await sbFetch('/auth/v1/user', { method: 'DELETE' }).catch(()=>{});
    }
    // Clear all local state and storage
    localStorage.clear();
    saveSession(null);
    hideLoadingOverlay();
    showToast('Account deleted. Sorry to see you go.', 'info');
    setState({ auth: null, conversations: [], notifications: [], savedProviders: [], providers: [] });
    navigate('landing');
  } catch(err) {
    hideLoadingOverlay();
    showToast('Error deleting account: ' + err.message, 'error');
  }
}

function calNavMonth(dir) {
  if(state.calMonth === undefined) state.calMonth = new Date().getMonth();
  if(state.calYear === undefined) state.calYear = new Date().getFullYear();
  state.calMonth += dir;
  if(state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
  if(state.calMonth < 0)  { state.calMonth = 11; state.calYear--; }
  saveState();
  render();
}

function toggleCalendarDay(d) {
  if(!state.calendarAvailability) state.calendarAvailability = [];
  const y = state.calYear || new Date().getFullYear();
  const m = state.calMonth !== undefined ? state.calMonth : new Date().getMonth();
  const key = y + '-' + m + '-' + d;
  const idx = state.calendarAvailability.indexOf(key);
  if(idx === -1) {
    state.calendarAvailability.push(key);
    showToast('Day marked available ✓', 'success');
  } else {
    state.calendarAvailability.splice(idx, 1);
    showToast('Day removed', 'info');
  }
  saveState();
  render();
}

function removeCalendarDay(key) {
  state.calendarAvailability = (state.calendarAvailability||[]).filter(k=>k!==key);
  saveState();
  render();
}

function markThisWeekAvailable() {
  if(!state.calendarAvailability) state.calendarAvailability = [];
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  // Get Mon-Fri of current week
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  for(let i = 0; i < 5; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const key = d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
    if(!state.calendarAvailability.includes(key)) state.calendarAvailability.push(key);
  }
  saveState();
  showToast('This week marked available! 📅', 'success');
  render();
}

function exportCalendarICS() {
  const avail = state.calendarAvailability || [];
  if(avail.length === 0) { showToast('No availability set yet', 'warning'); return; }
  let ics = 'BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//ProFinder//Availability//EN\n';
  avail.forEach(key => {
    const [y, m, d] = key.split('-').map(Number);
    const date = new Date(y, m, d);
    const dateStr = date.toISOString().replace(/[-:]/g,'').slice(0,8);
    ics += 'BEGIN:VEVENT\n';
    ics += 'DTSTART;VALUE=DATE:' + dateStr + '\n';
    ics += 'DTEND;VALUE=DATE:' + dateStr + '\n';
    ics += 'SUMMARY:Available - ProFinder\n';
    ics += 'DESCRIPTION:Available for new projects via ProFinder\n';
    ics += 'END:VEVENT\n';
  });
  ics += 'END:VCALENDAR';
  const blob = new Blob([ics], {type:'text/calendar'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'profinder-availability.ics';
  a.click();
  showToast('Calendar file downloaded! Import it into any calendar app. 📅', 'success');
}

function importICSFile(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    // Parse DTSTART lines from ICS
    const dates = [];
    const lines = text.split('\n');
    lines.forEach(line => {
      if(line.startsWith('DTSTART')) {
        const val = line.split(':')[1]?.trim().replace(/T.*/, '');
        if(val && val.length >= 8) {
          const y = parseInt(val.slice(0,4));
          const m = parseInt(val.slice(4,6)) - 1;
          const d = parseInt(val.slice(6,8));
          const key = y + '-' + m + '-' + d;
          if(!dates.includes(key)) dates.push(key);
        }
      }
    });
    if(dates.length > 0) {
      if(!state.calendarAvailability) state.calendarAvailability = [];
      dates.forEach(k => { if(!state.calendarAvailability.includes(k)) state.calendarAvailability.push(k); });
      if(!state.calendarSynced) state.calendarSynced = {};
      state.calendarSynced.outlook = true;
      saveState();
      closeModal();
      showToast('Imported ' + dates.length + ' dates from your calendar! 📧', 'success');
      render();
    } else {
      showToast('No dates found in file', 'warning');
    }
  };
  reader.readAsText(file);
}

// Check for Google Calendar OAuth return
function checkCalendarOAuthReturn() {
  const hash = window.location.hash;
  const pending = localStorage.getItem('pf_pending_cal_sync');
  if(pending === 'google' && hash && hash.includes('access_token')) {
    const params = new URLSearchParams(hash.replace('#',''));
    const token = params.get('access_token');
    if(token) {
      localStorage.removeItem('pf_pending_cal_sync');
      window.history.replaceState({}, '', window.location.pathname);
      // Fetch Google Calendar busy times
      fetchGoogleCalendarBusy(token);
    }
  }
}

async function fetchGoogleCalendarBusy(token) {
  showLoadingOverlay('Syncing Google Calendar...');
  try {
    const now = new Date();
    const timeMin = now.toISOString();
    const timeMax = new Date(now.getTime() + 30*24*60*60*1000).toISOString();
    const resp = await fetch(
      'https://www.googleapis.com/calendar/v3/freeBusy',
      {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ timeMin, timeMax, items: [{ id: 'primary' }] })
      }
    );
    const data = await resp.json();
    const busySlots = data.calendars?.primary?.busy || [];
    // Mark days NOT busy as available
    if(!state.calendarAvailability) state.calendarAvailability = [];
    for(let i = 0; i < 30; i++) {
      const d = new Date(now);
      d.setDate(now.getDate() + i);
      if(d.getDay() !== 0 && d.getDay() !== 6) { // skip weekends
        const dayStart = d.toISOString().slice(0,10);
        const isBusy = busySlots.some(s => s.start.slice(0,10) === dayStart);
        if(!isBusy) {
          const key = d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
          if(!state.calendarAvailability.includes(key)) state.calendarAvailability.push(key);
        }
      }
    }
    if(!state.calendarSynced) state.calendarSynced = {};
    state.calendarSynced.google = true;
    saveState();
    hideLoadingOverlay();
    showToast('Google Calendar synced! Free times marked as available. 📅', 'success');
    providerView = 'calendar';
    navigate('provider');
  } catch(e) {
    hideLoadingOverlay();
    // Even if API fails, mark as connected
    if(!state.calendarSynced) state.calendarSynced = {};
    state.calendarSynced.google = true;
    saveState();
    showToast('Google Calendar connected! 📅', 'success');
    render();
  }
}

function selectCallPlatform(platformId) {
  _selectedCallPlatform = platformId;

  const platforms = {
    google: { getUrl: () => 'https://meet.google.com/new', color: '#4285F4' },
    zoom: { getUrl: () => 'https://zoom.us/start/videomeeting', color: '#2D8CFF' },
    teams: { getUrl: () => 'https://teams.microsoft.com/l/meeting/new', color: '#6264A7' },
    facetime: { getUrl: () => 'facetime:' + (state.auth?.email||''), color: '#00C851' },
    whereby: { getUrl: () => 'https://whereby.com/profinder-' + (state.auth?.id||'guest') + '-' + Date.now(), color: '#5D2E8C' },
    custom: { getUrl: () => document.getElementById('customCallLink')?.value || '', color: '#717893' },
  };

  // Reset all styles
  Object.keys(platforms).forEach(id => {
    const el = document.getElementById('callopt_' + id);
    const check = document.getElementById('callcheck_' + id);
    if(el) { el.style.borderColor = 'var(--border)'; el.style.background = ''; el.classList.remove('selected'); }
    if(check) { check.style.background = ''; check.style.borderColor = 'var(--border)'; check.innerHTML = ''; }
  });

  // Highlight selected
  const p = platforms[platformId];
  const el = document.getElementById('callopt_' + platformId);
  const check = document.getElementById('callcheck_' + platformId);
  if(el) { el.style.borderColor = p.color; el.style.background = p.color + '12'; el.classList.add('selected'); }
  if(check) { check.style.background = p.color; check.style.borderColor = p.color; check.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'; }

  // Show/hide custom input
  const customWrap = document.getElementById('customLinkWrap');
  if(customWrap) customWrap.style.display = platformId === 'custom' ? 'block' : 'none';

  // Generate and show URL
  if(platformId !== 'custom') {
    _selectedCallUrl = p.getUrl();
    const preview = document.getElementById('callLinkPreview');
    const linkText = document.getElementById('callLinkText');
    if(preview) preview.style.display = 'block';
    if(linkText) linkText.textContent = _selectedCallUrl;
  }

  // Enable join button
  const btn = document.getElementById('joinCallBtn');
  if(btn) { btn.disabled = false; btn.style.opacity = '1'; }
}

function getElapsedTime() {
  if(!state.timerStarted) return '00:00:00';
  const elapsed = Math.floor((Date.now() - state.timerStarted) / 1000);
  const h = Math.floor(elapsed/3600).toString().padStart(2,'0');
  const m = Math.floor((elapsed%3600)/60).toString().padStart(2,'0');
  const s = (elapsed%60).toString().padStart(2,'0');
  return h+':'+m+':'+s;
}

function startTimer(contractId) {
  const desc = document.getElementById('timerDesc')?.value || '';
  state.timerRunning = contractId;
  state.timerStarted = Date.now();

  showToast('Timer started! ▶', 'success');
  openTimeTrackerModal(contractId);

function stopTimer(contractId) {
  if(!state.timerStarted) return;
  const minutes = Math.round((Date.now() - state.timerStarted) / 60000);
  if(!state.timeEntries) state.timeEntries = {};
  if(!state.timeEntries[contractId]) state.timeEntries[contractId] = [];
  state.timeEntries[contractId].push({
    desc: state.timerDesc || 'Work session',
    minutes: Math.max(1, minutes),
    date: new Date().toLocaleDateString()
  });
  state.timerRunning = null;
  state.timerStarted = null;
  state.timerDesc = null;
  if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  saveState();
  showToast('Time saved! ' + (minutes < 60 ? minutes + ' min' : (minutes/60).toFixed(1) + 'h'), 'success');
  openTimeTrackerModal(contractId);
}

function saveManualTimeEntry(contractId) {
  const desc = document.getElementById('manualDesc')?.value || 'Work session';
  const hours = parseFloat(document.getElementById('manualHours')?.value||0);
  const mins = parseFloat(document.getElementById('manualMins')?.value||0);
  const date = document.getElementById('manualDate')?.value || new Date().toLocaleDateString();
  const totalMins = Math.round(hours*60 + mins);
  if(totalMins <= 0) { showToast('Enter time greater than 0', 'warning'); return; }
  if(!state.timeEntries) state.timeEntries = {};
  if(!state.timeEntries[contractId]) state.timeEntries[contractId] = [];
  state.timeEntries[contractId].push({ desc, minutes: totalMins, date });
  saveState();
  showToast('Time entry saved!', 'success');
  openTimeTrackerModal(contractId);
}

function deleteTimeEntry(contractId, idx) {
  if(state.timeEntries?.[contractId]) {
    state.timeEntries[contractId].splice(idx, 1);
    saveState();
    openTimeTrackerModal(contractId);
  }
}

function generateTimeInvoice(contractId) {
  const entries = (state.timeEntries||{})[contractId] || [];
  const totalMins = entries.reduce((a,e)=>a+e.minutes,0);
  const totalHours = (totalMins/60).toFixed(1);
  closeModal();
  openModal(`

      ${entries.map(e=>`<div style="display:flex;justify-content:space-between;padding:3px 0"><span>${e.desc}</span><span>${(e.minutes/60).toFixed(1)}h</span></div>`).join('')}

function previewTemplate(templateId) {
  const t = PROPOSAL_TEMPLATES.find(x=>x.id===templateId) || (state.customTemplates||[]).find(x=>x.id===templateId);
  if(!t) return;
  const vars = [...new Set((t.body.match(/\{\{([^}]+)\}\}/g)||[]).map(v=>v.replace(/[{}]/g,'')))];
  let body = document.getElementById('templatePreview')?.value || t.body;
  vars.forEach(v => {
    const val = document.getElementById('tvar_'+v)?.value || '';
    body = body.replace(new RegExp('\\{\\{'+v+'\\}\\}','g'), val || '{{'+v+'}}');
  });
  const el = document.getElementById('templatePreview');
  if(el) el.value = body;
}

function sendTemplateMessage() {
  const text = document.getElementById('templatePreview')?.value?.trim();
  if(!text) { showToast('Template is empty', 'warning'); return; }
  const conv = (state.conversations||[]).find(c=>c.id===state.activeConv);
  closeModal();
  if(conv) {
    const msg = {id:Date.now(),from:'own',text,time:new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})};
    conv.messages = conv.messages||[];
    conv.messages.push(msg);
    conv.lastMsg = text.slice(0,50)+'...';
    conv.time = 'Just now';
    if(state.auth?.id && !String(state.auth.id).match(/^\d+$/) && conv.convId) {
      sbSendMessage(conv.convId, text).catch(()=>{});
    }
    saveState(); render();
    showToast('Proposal sent! 🚀','success');
  } else {
    // Copy to clipboard if no active conversation
    if(navigator.clipboard) navigator.clipboard.writeText(text).then(()=>showToast('Copied to clipboard!','success'));
    else showToast('No conversation selected','warning');
  }
}

function createRecurringInvoice() {
  const client = document.getElementById('recClient')?.value?.trim();
  const amount = document.getElementById('recAmount')?.value?.trim();
  const freq = document.getElementById('recFreq')?.value || 'month';
  const start = document.getElementById('recStart')?.value;
  const desc = document.getElementById('recDesc')?.value || '';
  if(!client || !amount) { showToast('Fill in client and amount','warning'); return; }
  const next = new Date(start);
  if(freq==='week') next.setDate(next.getDate()+7);
  else if(freq==='month') next.setMonth(next.getMonth()+1);
  else next.setMonth(next.getMonth()+3);
  if(!state.recurringInvoices) state.recurringInvoices = [];
  state.recurringInvoices.push({
    client, amount, frequency: freq, desc,
    nextDate: next.toLocaleDateString(), active: true
  });
  saveState();
  showToast('Recurring invoice created! 🔄','success');
  openRecurringInvoiceModal();
}

function toggleRecurring(idx) {
  if(state.recurringInvoices?.[idx]) {
    state.recurringInvoices[idx].active = !state.recurringInvoices[idx].active;
    saveState();
    openRecurringInvoiceModal();
  }
}

function deleteRecurring(idx) {
  state.recurringInvoices?.splice(idx,1);
  saveState();
  openRecurringInvoiceModal();
}
