function exportSpendReport() {
  const history = state.engagementHistory || [];
  let csv = 'Provider,Project,Amount,Date,Category\n';
  history.forEach(h => {
    csv += `"${h.party}","${h.title}","$${h.value}","${h.date}","${h.category}"\n`;
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'profinder-spend-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  showToast('Spend report exported! ⬇','success');
}

// ============================================================
// NATIVE PUSH NOTIFICATIONS
// ============================================================
function sendPushNotification(title, body, icon) {
  if('Notification' in window && Notification.permission === 'granted') {
    try {
      new Notification(title, {
        body,
        icon: icon || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="100" fill="%230057FF"/><text x="256" y="340" text-anchor="middle" font-family="Arial Black" font-weight="900" font-size="280" fill="white">P</text></svg>',
        badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="100" fill="%230057FF"/></svg>'
      });
    } catch(e) {}
  }
}

// Override addNotification to also send push
const _origAddNotification = addNotification;
function addNotification(text, icon, type) {
  _origAddNotification(text, icon, type);
  sendPushNotification('ProFinder', text, null);
}

function handleURLParams() {
  const params = new URLSearchParams(window.location.search);
  const category = params.get('category');
  const provider = params.get('provider');
  const shortlist = params.get('shortlist');
  const book = params.get('book');

  if(category && state.auth) {
    activeCategory = category.charAt(0).toUpperCase() + category.slice(1);
    navigate('seeker');
  }
  if(provider && state.auth) {
    selectedProviderId = parseInt(provider);
    navigate('provider-detail');
  }
  if(shortlist) {
    const ids = shortlist.split(',').map(Number);
    state.viewingShortlist = ids;
    showToast('Viewing shared shortlist (' + ids.length + ' providers)','info');
  }
}



// ============================================================
// SUPABASE REALTIME — Live Messages
// ============================================================
let _realtimeChannel = null;

function subscribeToMessages() {
  if(!state.auth?.id || String(state.auth.id).match(/^\d+$/)) return;
  if(_realtimeChannel) return; // already subscribed

  // Use polling as fallback since Supabase Realtime requires WebSocket
  // Poll every 5 seconds for new messages when messages page is open
  _realtimeChannel = setInterval(async () => {
    if(currentPage !== 'messages') return;
    const prevCounts = (state.conversations||[]).map(c => ({id:c.id, count:(c.messages||[]).length}));
    await loadConversations();
    // Check if any new messages arrived
    (state.conversations||[]).forEach(c => {
      const prev = prevCounts.find(x=>x.id===c.id);
      if(prev && (c.messages||[]).length > prev.count) {
        const newest = c.messages[c.messages.length-1];
        if(newest.from === 'them') {
          addNotification('New message from ' + c.name, '💬', 'message');
          sendPushNotification('New message', c.name + ': ' + newest.text);
          if(state.activeConv === c.id) render(); // refresh chat view
        }
      }
    });
  }, 5000);
  console.log('Realtime polling started');
}

function unsubscribeFromMessages() {
  if(_realtimeChannel) {
    clearInterval(_realtimeChannel);
    _realtimeChannel = null;
  }
}

// Start realtime when user logs in
const _origLoadUserData = loadUserData;
async function loadUserData() {
  await _origLoadUserData();
  subscribeToMessages();
}

// Also subscribe to brief replies for providers
let _briefPollChannel = null;
function subscribeToBriefReplies() {
  if(!state.auth?.id || state.auth?.role !== 'provider') return;
  if(_briefPollChannel) return;
  _briefPollChannel = setInterval(async () => {
    const prevCount = (state.seekerPosts||[]).length;
    await loadBriefs();
    const newCount = (state.seekerPosts||[]).length;
    if(newCount > prevCount) {
      addNotification('New brief posted — check Client Briefs', '📢', 'brief');
    }
  }, 30000); // every 30s for briefs
}



function attachFile(input) {
  const file = input.files[0];
  if(!file) return;
  const conv = (state.conversations||[]).find(c=>c.id===state.activeConv);
  if(!conv) return;
  const msg = {
    id: Date.now(),
    from: 'own',
    text: '📎 ' + file.name + ' (' + (file.size/1024).toFixed(1) + ' KB)',
    time: new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})
  };
  conv.messages = conv.messages || [];
  conv.messages.push(msg);
  conv.lastMsg = msg.text;
  conv.time = 'Just now';
  if(state.auth?.id && !String(state.auth.id).match(/^\d+$/) && conv.convId) {
    sbSendMessage(conv.convId, msg.text).catch(()=>{});
  }
  saveState();
  render();
  showToast('File attached: ' + file.name, 'success');
  input.value = '';
}
