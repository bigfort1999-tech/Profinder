const SUPABASE_URL = 'https://profinder-xi.vercel.app/sb';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0bXduYmJidXVmeXdpZmRnZHRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzc2NTUsImV4cCI6MjA4ODk1MzY1NX0.-_V4AtDhq3BbQJVMr_efmD3F-gbibQoWVBAiEi-cB_4';

let _sbSession = null;

// ── CORE FETCH HELPERS ────────────────────────────────────────
function sbHeaders(extra={}) {
  const h = {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_ANON,
    'Authorization': 'Bearer ' + (_sbSession?.access_token || SUPABASE_ANON),
    ...extra
  };
  return h;
}

async function sbFetch(path, options={}) {
  const fullUrl = SUPABASE_URL + path;
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    const method = options.method || 'GET';
    xhr.open(method, fullUrl);
    const headers = { ...sbHeaders(), ...(options.headers||{}) };
    Object.entries(headers).forEach(([k,v]) => { try { xhr.setRequestHeader(k, v); } catch(e){} });
    xhr.onload = () => {
      const text = xhr.responseText;
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch(e) { data = text; }
      if(xhr.status >= 400) reject(new Error((data && (data.message || data.error_description || data.msg)) || 'Request failed ' + xhr.status));
      else resolve(data);
    };
    xhr.onerror = () => reject(new Error('Network error — URL: ' + fullUrl));
    xhr.ontimeout = () => reject(new Error('Timeout'));
    xhr.timeout = 15000;
    xhr.send(options.body || null);
  });
}

async function sbRpc(fn, body={}) {
  return sbFetch('/rest/v1/rpc/' + fn, { method:'POST', body: JSON.stringify(body) });
}

// ── SESSION PERSISTENCE ───────────────────────────────────────
function saveSession(session) {
  _sbSession = session;
  if(session) localStorage.setItem('sb_session', JSON.stringify(session));
  else localStorage.removeItem('sb_session');
}

function loadSession() {
  try {
    const s = localStorage.getItem('sb_session');
    if(s) { _sbSession = JSON.parse(s); return _sbSession; }
  } catch(e) {}
  return null;
}

async function refreshSession() {
  if(!_sbSession?.refresh_token) return false;
  try {
    const data = await sbFetch('/auth/v1/token?grant_type=refresh_token', {
      method: 'POST',
      body: JSON.stringify({ refresh_token: _sbSession.refresh_token })
    });
    saveSession(data);
    return true;
  } catch(e) {
    saveSession(null);
    return false;
  }
}

// ── AUTH ──────────────────────────────────────────────────────
async function sbSignUp(email, password, name, role, entityType) {
  showLoadingOverlay('Creating your account...');
  try {
    // Use XMLHttpRequest which has different CORS behavior than fetch on Safari
    let data;
    try {
      data = await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', SUPABASE_URL + '/auth/v1/signup');
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.setRequestHeader('apikey', SUPABASE_ANON);
        xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_ANON);
        xhr.onload = () => {
          try {
            const res = JSON.parse(xhr.responseText);
            if(xhr.status >= 400) reject(new Error(res.message || res.error_description || 'Signup failed ' + xhr.status));
            else resolve(res);
          } catch(e) { reject(new Error('Parse error')); }
        };
        xhr.onerror = () => reject(new Error('Network error'));
        xhr.ontimeout = () => reject(new Error('Timeout'));
        xhr.timeout = 10000;
        xhr.send(JSON.stringify({ email, password, data: { name, role, entity_type: entityType } }));
      });
    } catch(fetchErr) {
      hideLoadingOverlay();
      await sendMagicLink(email, name, role, entityType);
      return;
    }
    saveSession(data);
    const userId = data.user?.id;
    if(!userId) throw new Error('Signup succeeded but no user returned');

    // Create profile
    const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    await sbFetch('/rest/v1/profiles', {
      method: 'POST',
      headers: { 'Prefer': 'return=minimal', 'Authorization': 'Bearer ' + data.access_token },
      body: JSON.stringify({ id: userId, name, email, role, entity_type: entityType, avatar: initials, plan: 'starter', is_admin: false })
    }).catch(e => { if(!e.message.includes('duplicate') && !e.message.includes('23505')) throw e; });

    // Create provider listing if provider
    if(role === 'provider') {
      await sbFetch('/rest/v1/providers', {
        method: 'POST',
        headers: { 'Prefer': 'return=minimal', 'Authorization': 'Bearer ' + data.access_token },
        body: JSON.stringify({ id: userId, entity_type: entityType, available: true, rating: 5.0, review_count: 0 })
      }).catch(()=>{});
    }

    await loadUserProfile({ id: userId, email });
    hideLoadingOverlay();
    showToast('Welcome to ProFinder, ' + name.split(' ')[0] + '! 🎉', 'success');
    navigate(role === 'provider' ? 'provider' : 'seeker');
  } catch(err) {
    hideLoadingOverlay();
    showToast('Signup error: ' + (err.message || JSON.stringify(err)), 'error');
    console.error('sbSignUp error:', err);
    throw err;
  }
}

async function sbSignIn(email, password) {
  showLoadingOverlay('Signing in...');
  try {
    let data;
    try {
      data = await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', SUPABASE_URL + '/auth/v1/token?grant_type=password');
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.setRequestHeader('apikey', SUPABASE_ANON);
        xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_ANON);
        xhr.onload = () => {
          try {

            else resolve(res);
          } catch(e) { reject(new Error('Parse error')); }
        };
        xhr.onerror = () => reject(new Error('Network error'));
        xhr.timeout = 10000;
        xhr.ontimeout = () => reject(new Error('Timeout'));
        xhr.send(JSON.stringify({ email, password }));
      });
    } catch(fetchErr) {

async function loadUserProfile(user) {
  try {
    const profiles = await sbFetch('/rest/v1/profiles?id=eq.' + user.id + '&select=*');
    const profile = Array.isArray(profiles) ? profiles[0] : profiles;
    if(profile) {
      setState({ auth: {
        id: profile.id, name: profile.name, email: profile.email,
        role: profile.role, entityType: profile.entity_type,
        avatar: profile.avatar, avatarUrl: profile.avatar_url || null,
        plan: profile.plan || 'starter', title: profile.title || '',
        bio: profile.bio || '', rate: profile.rate || '',
        location: profile.location || '', website: profile.website || '',
        linkedin: profile.linkedin || '',
        isAdmin: profile.is_admin || false, verified: profile.verified || false
      }});
      await loadUserData();
    }
  } catch(e) {
    console.warn('Could not load profile:', e.message);
  }

async function loadUserData() {

async function loadConversations() {
  if(!state.auth?.id || String(state.auth.id).match(/^\d+$/)) return;
  try {
    const data = await dbSelect('conversations',
      'select=*,pa:profiles!conversations_participant_a_fkey(name,avatar,entity_type),pb:profiles!conversations_participant_b_fkey(name,avatar,entity_type)' +
      '&or=(participant_a.eq.' + state.auth.id + ',participant_b.eq.' + state.auth.id + ')' +
      '&order=last_message_at.desc'
    );
    if(data && data.length > 0) {
      state.conversations = await Promise.all(data.map(async c => {
        const isA = c.participant_a === state.auth.id;
        const other = isA ? c.pb : c.pa;
        let messages = [];
        try {
          const msgs = await dbSelect('messages', 'conversation_id=eq.' + c.id + '&order=created_at.asc&limit=50');
          messages = (msgs||[]).map(m => ({
            id: m.id, from: m.sender_id === state.auth.id ? 'own' : 'them',
            text: m.content, time: formatTime(m.created_at)
          }));
        } catch(e) {}
        const unread = messages.filter(m => m.from === 'them').length;
        return {
          id: c.id, convId: c.id, name: other?.name || 'User',
          role: other?.entity_type || 'User', avatar: other?.avatar || '??',
          color: '#0057FF', lastMsg: c.last_message || '', time: timeAgo(c.last_message_at),
          unread, messages
        };
      }));
      saveState();
    }
  } catch(e) { console.warn('loadConversations:', e.message); }
}

    const c = Array.isArray(convData) ? convData[0] : convData;
    const receiverId = c?.participant_a === state.auth.id ? c?.participant_b : c?.participant_a;
    await dbInsert('messages', {
      conversation_id: convId, sender_id: state.auth.id,

    });
    await dbUpdate('conversations', { last_message: content, last_message_at: new Date().toISOString() }, 'id=eq.' + convId);
    await loadConversations();
  } catch(e) { console.warn('sbSendMessage:', e.message); }
}

// ── HELPERS ───────────────────────────────────────────────────
function timeAgo(dateStr) {
  if(!dateStr) return 'recently';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if(mins < 1) return 'Just now';
  if(mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if(days < 7) return days + 'd ago';
  return new Date(dateStr).toLocaleDateString();
}

function formatTime(dateStr) {
  if(!dateStr) return '';
  return new Date(dateStr).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function showLoadingOverlay(msg) {
  msg = msg || 'Loading...';
  let el = document.getElementById('loadingOverlay');
  if(!el) {

    document.body.appendChild(el);
  }

  el.style.display = 'flex';
}

// ── MAGIC LINK AUTH ──────────────────────────────────────────
async function sendMagicLink(email, name, role, entityType, isLogin=false) {
  // Store pending signup data so we can create profile after redirect
  if(!isLogin && name) {
    localStorage.setItem('pf_pending_signup', JSON.stringify({ name, role, entityType, email }));
  }
  // Use a full page redirect to Supabase's auth UI — no fetch needed, Safari allows this
  const redirectTo = encodeURIComponent('https://profinder-xi.vercel.app/');
  const sbAuthUrl = 'https://xtmwnbbbuufywifdgdtp.supabase.co/auth/v1/authorize?provider=email&redirect_to=' + redirectTo;
  
  // Use a hidden form POST — bypasses CORS entirely, browser sends it natively
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = 'https://xtmwnbbbuufywifdgdtp.supabase.co/auth/v1/otp';
  form.style.display = 'none';
  form.enctype = 'text/plain';

  // We can't do a form POST to JSON API, so use an iframe approach
  // Instead: open Supabase's built-in email OTP via a new hidden iframe
  // Best working approach: use a Blob URL script that does the XHR
  const script = document.createElement('script');
  const code = `
    var x = new XMLHttpRequest();
    x.open('POST', 'https://xtmwnbbbuufywifdgdtp.supabase.co/auth/v1/otp');
    x.setRequestHeader('Content-Type', 'application/json');
    x.setRequestHeader('apikey', '${SUPABASE_ANON}');
    x.send(JSON.stringify({email: '${email.replace(/'/g,"\'")}', options: {emailRedirectTo: 'https://profinder-xi.vercel.app/'}}));
  `;
  const blob = new Blob([code], {type: 'application/javascript'});
  script.src = URL.createObjectURL(blob);
  document.head.appendChild(script);

  openModal(`
    <div style="text-align:center;padding:32px 24px">
      <div style="font-size:48px;margin-bottom:16px">📧</div>
      <h3 style="font-size:20px;font-weight:800;margin-bottom:8px">${isLogin ? 'Check your email' : 'Almost there!'}</h3>
      <p style="color:var(--text-2);font-size:14px;line-height:1.6;margin-bottom:20px">
        We sent a magic sign-in link to<br>
        <strong style="color:var(--accent)">${email}</strong><br><br>
        Tap the link in your email to ${isLogin ? 'sign in' : 'activate your account'}. It expires in 1 hour.
      </p>
      <div style="background:var(--surface-2);border-radius:12px;padding:14px;font-size:13px;color:var(--text-2);margin-bottom:20px">
        💡 Can't find it? Check your spam folder.
      </div>
      <button class="btn btn-primary w-full" onclick="closeModal()">Got it</button>
    </div>
  `);
}

// Handle magic link redirect on page load
function handleMagicLinkReturn() {
  const hash = window.location.hash;
  if(!hash || !hash.includes('access_token')) return;
  const params = new URLSearchParams(hash.replace('#', ''));
  const accessToken = params.get('access_token');
  const refreshToken = params.get('refresh_token');
  if(!accessToken) return;
  window.location.hash = '';
  saveSession({ access_token: accessToken, refresh_token: refreshToken });
  _sbSession = { access_token: accessToken, refresh_token: refreshToken };
  // Check for pending signup data
  const pending = localStorage.getItem('pf_pending_signup');
  showLoadingOverlay('Setting up your account...');
  sbFetch('/auth/v1/user').then(async userData => {
    if(pending) {
      const { name, role, entityType } = JSON.parse(pending);
      localStorage.removeItem('pf_pending_signup');
      const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      await sbFetch('/rest/v1/profiles', {
        method: 'POST',
        headers: { 'Prefer': 'return=minimal,resolution=merge-duplicates' },
        body: JSON.stringify({ id: userData.id, name, email: userData.email, role, entity_type: entityType, avatar: initials, plan: 'starter', is_admin: false })
      }).catch(()=>{});
      if(role === 'provider') {
        await sbFetch('/rest/v1/providers', {
          method: 'POST',
          headers: { 'Prefer': 'return=minimal' },
          body: JSON.stringify({ id: userData.id, entity_type: entityType, available: true, rating: 5.0, review_count: 0 })
        }).catch(()=>{});
      }
    }
    await loadUserProfile({ id: userData.id, email: userData.email });
    hideLoadingOverlay();
    showToast('Welcome to ProFinder! 🎉', 'success');
    render();
  }).catch(e => {
    hideLoadingOverlay();
    console.warn('Magic link return error:', e.message);
  });
}

// ── FILE UPLOADS ─────────────────────────────────────────────
async function uploadAvatar(input) {
  const file = input.files[0];
  if(!file) return;
  if(file.size > 5 * 1024 * 1024) { showToast('Image must be under 5MB', 'warning'); return; }
  showLoadingOverlay('Uploading photo...');
  try {
    const ext = file.name.split('.').pop();
    const path = 'avatars/' + state.auth.id + '.' + ext;
    const arrayBuf = await file.arrayBuffer();
    const res = await fetch(SUPABASE_URL + '/storage/v1/object/avatars/' + state.auth.id + '.' + ext, {
      method: 'POST',
      headers: {
        ...sbHeaders(),
        'Content-Type': file.type,
        'x-upsert': 'true'
      },
      body: arrayBuf
    });
    if(!res.ok) {
      // Storage bucket may not exist, fall back to base64 in profile
      const reader = new FileReader();
      reader.onload = async (e) => {
        const base64 = e.target.result;
        await dbUpdate('profiles', { avatar_url: base64 }, 'id=eq.' + state.auth.id).catch(()=>{});
        state.auth.avatarUrl = base64;
        saveState(); render();
        hideLoadingOverlay();
        showToast('Profile photo updated! 📸', 'success');
      };
      reader.readAsDataURL(file);
      return;
    }
    const avatarUrl = SUPABASE_URL + '/storage/v1/object/public/avatars/' + state.auth.id + '.' + ext;
    await dbUpdate('profiles', { avatar_url: avatarUrl }, 'id=eq.' + state.auth.id).catch(()=>{});
    state.auth.avatarUrl = avatarUrl;
    saveState(); render();
    hideLoadingOverlay();
    showToast('Profile photo updated! 📸', 'success');
  } catch(err) {
    hideLoadingOverlay();
    showToast('Upload failed: ' + err.message, 'error');
  }
}

async function saveEditProfile() {

  const bio = document.getElementById('editBio')?.value?.trim();
  const rate = document.getElementById('editRate')?.value?.trim();
  const location = document.getElementById('editLocation')?.value?.trim();
  const website = document.getElementById('editWebsite')?.value?.trim();
  const linkedin = document.getElementById('editLinkedin')?.value?.trim();
  if(!name || !email) { showToast('Name and email are required', 'warning'); return; }
  try {
    const updates = { name, email, location, website, linkedin };
    if(state.auth?.role === 'provider') Object.assign(updates, { title, bio, rate });

    if(state.auth?.role === 'provider' && title) {
      await dbUpdate('providers', { title, bio, rate }, 'id=eq.' + state.auth.id).catch(()=>{});
    }
    Object.assign(state.auth, updates);
    saveState(); render(); closeModal();
    showToast('Profile updated! ✅', 'success');
  } catch(err) {
    showToast('Error: ' + err.message, 'error');

}

// ── INIT ON LOAD ──────────────────────────────────────────────
async function initApp() {
  const session = loadSession();
  if(session?.access_token) {
    _sbSession = session;
    try {
      const userData = await sbFetch('/auth/v1/user');
      await loadUserProfile({ id: userData.id, email: userData.email });
      render();
    } catch(e) {
      // Token expired, try refresh
      const refreshed = await refreshSession();
      if(refreshed) {
        try {
          const userData = await sbFetch('/auth/v1/user');
          await loadUserProfile({ id: userData.id, email: userData.email });
          render();
        } catch(e2) {
          saveSession(null);
        }
      }
    }
  }
  // Handle OAuth redirect (hash contains access_token)
  const hash = window.location.hash;
  if(hash && hash.includes('access_token')) {
    const params = new URLSearchParams(hash.replace('#', ''));
    const fakeSession = {
      access_token: params.get('access_token'),
      refresh_token: params.get('refresh_token')
    };
    saveSession(fakeSession);
    try {
      const userData = await sbFetch('/auth/v1/user');
      await loadUserProfile({ id: userData.id, email: userData.email });
      window.location.hash = '';
      render();
    } catch(e) { console.warn('OAuth init failed:', e.message); }
  }
}

async function acceptPitch(pitchId, pitcherId, pitcherName) {
  const msg = document.getElementById('acceptMsg')?.value || '';
  closeModal();
  showLoadingOverlay('Creating contract...');
  try {
    if(state.auth?.id && !String(state.auth.id).match(/^\d+$/)) {
      const client = await initSupabase();
      await client.from('pitches').update({status: 'accepted'}).eq('id', pitchId);
      await client.from('contracts').insert({
        seeker_id: state.auth.id, provider_id: pitcherId,
        title: 'New Contract', status: 'pending_signature', milestones: []
      });
      await sbStartConversation(pitcherId, pitcherName);
      if(msg && state.activeConv) await sbSendMessage(state.activeConv, msg);
      await loadContracts();
    }
    hideLoadingOverlay();
    showToast('Pitch accepted! Contract created.', 'success');
    addNotification(pitcherName + ' pitch accepted - contract created', '🤝', 'success');
    jobsTab = 'contracts';
    navigate('jobs');
  } catch(err) {
    hideLoadingOverlay();
    showToast('Error: ' + err.message, 'error');
  }
}

function openSignContractModal(contractId) {
  const contract = (state.contracts||[]).find(c => c.id === contractId);
  if(!contract) return;
  openModal(`
  <div class="modal-header">
    <h3>Sign Contract</h3>
    <button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()">X</button>
  </div>
  <div style="display:flex;flex-direction:column;gap:16px">
    <div style="background:var(--bg2);border-radius:var(--radius);padding:16px">
      <div style="font-weight:700;margin-bottom:4px">${contract.title}</div>
      <div style="font-size:13px;color:var(--text3)">Value: ${contract.value||'TBD'}</div>
    </div>
    <div style="background:var(--warning)10;border:1px solid var(--warning)30;border-radius:var(--radius);padding:14px;font-size:13px">
      By signing, you agree to the terms of this contract. This action cannot be undone.
    </div>
    <div class="input-wrap">
      <label class="label">Type your full name to sign</label>
      <input id="signatureName" class="input" placeholder="${state.auth?.name||'Your full name'}"/>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline flex-1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary flex-1" onclick="signContract('${contractId}')">Sign Contract</button>
    </div>
  </div>`);
}

async function signContract(contractId) {
  const sig = document.getElementById('signatureName')?.value?.trim();
  if(!sig) { showToast('Please type your name to sign', 'warning'); return; }
  if(sig.toLowerCase() !== (state.auth?.name||'').toLowerCase()) {
    showToast('Name does not match your account name', 'warning'); return;
  }
  closeModal();
  try {
    if(state.auth?.id && !String(state.auth.id).match(/^\d+$/)) {
      const client = await initSupabase();
      await client.from('contracts').update({status: 'active'}).eq('id', contractId);
      await loadContracts();
    } else {
      state.contracts = (state.contracts||[]).map(c => c.id===contractId ? {...c, status:'active'} : c);
      saveState();
    }
    showToast('Contract signed and active! 🎉', 'success');
    addNotification('Contract signed and active', '✍️', 'success');
    render();
  } catch(err) {
    showToast('Error: ' + err.message, 'error');
  }
}
